services:
  backend:
    build:
      context: ./planetaluzu
    env_file:
      - ./planetaluzu/.env
    environment:
      APP_CORS_ALLOWED_ORIGINS: https://planeta-luzu.pl,https://www.planeta-luzu.pl
      SESSION_COOKIE_SAME_SITE: lax
      SESSION_COOKIE_SECURE: "true"
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./planeta-luzu-fe
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
